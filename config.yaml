# SimulinkGPT Configuration

# Model Configuration
model:
  # Base model to use (HuggingFace path or local file)
  name: "microsoft/Phi-3-mini-4k-instruct"
  # Use transformers backend (works better on Windows)
  backend: "transformers"
  max_tokens: 2048
  temperature: 0.7
  top_p: 0.9
  top_k: 40
  
  # Context window
  context_window: 4096

# RAG Configuration
rag:
  # Vector database
  vector_db: "chroma"  # Options: chroma, faiss, qdrant
  
  # Embedding model
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  embedding_dim: 384
  
  # Retrieval settings
  top_k: 5
  similarity_threshold: 0.7
  
  # Knowledge base path
  knowledge_base_path: "./knowledge_base"

# Simulink Parser Configuration
simulink:
  # MATLAB Engine settings
  matlab_path: null  # Path to MATLAB installation (optional)
  
  # Alternative: Parse SLX as XML (no MATLAB required)
  use_xml_parsing: true
  
  # Extraction settings
  extract_blocks: true
  extract_signals: true
  extract_parameters: true
  extract_subsystems: true

# Application Settings
app:
  # Interface type: streamlit, gradio, cli
  interface: "streamlit"
  
  # Server settings
  host: "0.0.0.0"
  port: 8501
  
  # Logging
  log_level: "INFO"
  log_file: "./logs/simulinkgpt.log"

# Paths
paths:
  models_dir: "./models"
  cache_dir: "./cache"
  output_dir: "./output"
